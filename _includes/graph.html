<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: transparent; }
</style>
</head>
<body>
<div style="display:flex;gap:20px;margin-bottom:1.25rem;font-size:12px;font-family:'DM Sans',sans-serif;">
  <span style="display:flex;align-items:center;gap:6px;">
    <span style="width:10px;height:10px;border-radius:2px;background:#1D9E75;flex-shrink:0;"></span>
    currently using
  </span>
  <span style="display:flex;align-items:center;gap:6px;">
    <span style="width:10px;height:10px;border-radius:2px;background:#378ADD;flex-shrink:0;"></span>
    previous experience
  </span>
</div>
<div style="position: relative; width: 100%; height: 1080px;">
  <canvas id="techChart" role="img" aria-label="Years of experience per technology ranked from most to least"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){

const NOW_YEAR  = new Date().getFullYear();
const NOW_MONTH = new Date().getMonth() + 1;

function yrs(fy, fm, ty, tm) {
  return Math.round(((ty - fy) * 12 + (tm - fm)) / 12 * 10) / 10;
}

const JOBS = [
  { from: [2024,11], to: null,      techs: ["Python","Snowflake","Databricks","LLM API","LLM Standalone","Data Engineering","CI/CD DevOps","Data Lakes","SQL Server"] },
  { from: [2023, 3], to: [2024,10], techs: ["Microsoft Fabric","Azure Data Factory","Data Lakes","Databricks","Python","Data Engineering","CI/CD DevOps"] },
  { from: [2020, 9], to: [2023, 3], techs: ["Azure Data Factory","Databricks","Azure SQL","Python","T-SQL","Power BI","Data Engineering","ETL-SSIS"] },
  { from: [2019, 1], to: [2020, 9], techs: ["Databricks","Python","Data Science","Data Lakes","Data Engineering","Azure Data Factory"] },
  { from: [2016, 3], to: [2019, 1], techs: ["Power BI","Tableau","IBM Cognos","Data Engineering","ETL-SSIS"] },
  { from: [2013, 7], to: [2016, 3], techs: ["SQL Server","ETL-SSIS","Power BI","IBM Cognos","Data Engineering"] },
  { from: [2010, 8], to: [2013, 7], techs: ["SQL Server","IBM Cognos","ETL-SSIS","Data Engineering"] },
  { from: [2008, 8], to: [2010, 8], techs: ["SQL Server","Oracle","PostgreSQL","Java"] },
];

const CURRENT = new Set(JOBS.find(j => j.to === null).techs);

const totals = {};
JOBS.forEach(job => {
  const [fy, fm] = job.from;
  const [ty, tm] = job.to ? job.to : [NOW_YEAR, NOW_MONTH];
  const duration = yrs(fy, fm, ty, tm);
  job.techs.forEach(t => { totals[t] = (totals[t] || 0) + duration; });
});

const data = Object.keys(totals).map(name => ({
  name,
  years: Math.round(totals[name]),
  current: CURRENT.has(name),
})).sort((a, b) => b.years - a.years);

const MAX = data[0].years;
const BLUE = "#378ADD";
const TEAL = "#1D9E75";

new Chart(document.getElementById('techChart'), {
  type: 'bar',
  data: {
    labels: data.map(t => t.name),
    datasets: [{
      data: data.map(t => t.years),
      backgroundColor: data.map(t => t.current ? TEAL : BLUE),
      borderWidth: 0,
      borderRadius: 4,
      borderSkipped: false,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` ${data[ctx.dataIndex].years} yrs`,
          afterLabel: ctx => data[ctx.dataIndex].current ? ' currently using' : '',
        },
        backgroundColor: '#1e1e26',
        titleColor: '#f0efe8',
        bodyColor: '#a0a09a',
        borderColor: 'rgba(255,255,255,0.1)',
        borderWidth: 1,
        padding: 10,
        cornerRadius: 6,
      }
    },
    layout: { padding: { right: 48 } },
    scales: {
      x: {
        min: 0,
        max: MAX + 1,
        ticks: {
          stepSize: 2,
          color: '#888780',
          font: { size: 11, family: "'DM Sans', sans-serif" },
          callback: v => v === 0 ? '' : v + ' yrs',
        },
        grid: { color: 'rgba(136,135,128,0.15)' },
        border: { display: false },
      },
      y: {
        ticks: {
          color: ctx => data[ctx.index]?.current ? '#1D9E75' : '#666663',
          font: ctx => ({
            size: 12,
            weight: data[ctx.index]?.current ? '500' : '400',
            family: "'DM Sans', sans-serif"
          }),
          padding: 8,
        },
        grid: { display: false },
        border: { display: false },
      }
    },
    animation: { duration: 700, easing: 'easeOutQuart' }
  },
  plugins: [{
    afterDatasetsDraw(chart) {
      const { ctx, scales: { x, y } } = chart;
      ctx.save();
      data.forEach((t, i) => {
        const xPos = x.getPixelForValue(t.years);
        const yPos = y.getPixelForValue(i);
        ctx.fillStyle = t.current ? '#1D9E75' : '#666663';
        ctx.font = (t.current ? '500' : '400') + ' 12px "DM Sans", sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(t.years, xPos + 8, yPos);
      });
      ctx.restore();
    }
  }]
});
})();
</script>
</body>
</html>
